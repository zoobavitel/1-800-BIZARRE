# CI: frontend + backend + integration tests
# CD: GitHub Pages on master
# Optional manual deploy to LXC (CT 103) via pve2 over Tailscale + SSH

name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      lxc_action:
        description: "LXC: run CI only, or deploy to CT 103 on master via pve2. Choosing deploy confirms manual release checks are complete."
        type: choice
        options:
          - none
          - deploy
        default: none

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --coverage --watchAll=false

      - name: Run frontend linting
        run: npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: app.settings
        run: cd backend/src && python manage.py test

      - name: Check Django migrations
        env:
          DJANGO_SETTINGS_MODULE: app.settings
        run: cd backend/src && python manage.py makemigrations --check --dry-run

  integration-test:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          npm ci
          pip install -r backend/requirements.txt

      - name: Setup test database
        env:
          DJANGO_SETTINGS_MODULE: app.settings
        run: |
          cd backend/src
          python manage.py migrate
          python manage.py loaddata characters/fixtures/*.json

      - name: Run integration tests
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          RUN_BACKEND_INTEGRATION: "1"
        run: |
          set -e
          cd backend/src
          python manage.py runserver 127.0.0.1:8000 --noreload &
          BACKEND_PID=$!
          trap 'kill $BACKEND_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8000/" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:8000/" >/dev/null
          cd ../../frontend
          npm test -- --testPathPattern=integration --watchAll=false

  automated-ui-smoke:
    needs: [integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run automated UI smoke
        run: npm run test:automated-ui

  performance-budget:
    needs: [automated-ui-smoke]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          npm ci
          pip install -r backend/requirements.txt

      - name: Run performance budget checks (warn-only)
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          PERF_API_BASE_URL: "http://127.0.0.1:8000"
          PERF_FRONTEND_URL: "http://127.0.0.1:3000"
        run: |
          set -e
          cd backend/src
          python manage.py runserver 127.0.0.1:8000 --noreload &
          BACKEND_PID=$!
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8000/" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:8000/" >/dev/null
          cd ../../frontend
          npm start &
          FRONTEND_PID=$!
          trap 'kill $BACKEND_PID 2>/dev/null || true; kill $FRONTEND_PID 2>/dev/null || true' EXIT
          cd ..
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:3000/" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:3000/" >/dev/null
          node scripts/perf/api-latency-check.mjs
          node scripts/perf/lighthouse-budget-check.mjs

  deploy-github-pages:
    needs: [automated-ui-smoke]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          force_orphan: true

  deploy-lxc:
    needs: [automated-ui-smoke]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.lxc_action == 'deploy' &&
      github.ref == 'refs/heads/master'
    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH (pve2 -> CT 103)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LXC_SSH_HOST }} # e.g. pve2.tailb65341.ts.net
          username: ${{ secrets.LXC_SSH_USER }} # root
          key: ${{ secrets.LXC_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            pct exec 103 -- bash -lc '
              set -euo pipefail
              cd /opt/bizarre
              git pull --ff-only
              source .venv/bin/activate
              pip install -q -r backend/requirements.txt
              pip install -q -r backend/requirements-prod.txt
              cd backend/src
              export DJANGO_SETTINGS_MODULE=app.settings_prod
              python manage.py migrate --noinput
              python manage.py collectstatic --noinput
              systemctl restart gunicorn
              systemctl restart celery-worker || true
            '
